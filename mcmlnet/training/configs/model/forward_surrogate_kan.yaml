# @package _global_

name: ForwardSurrogateModelKAN

model:
  _target_: mcmlnet.training.models.kan_model.KANModel
  _recursive_: False

  mode: ${train_mode}
  batch_size: ${batch_size}
  max_augm_epochs: ${max_augm_epochs}
  n_wavelengths: ${n_wavelengths}

  generator:
    _target_: mcmlnet.training.models.kan.KAN
    layers_hidden: [15, 512, 512, 512, 1]
    grid_size: 30
    grid_range: [-5, 5]
    apply_sigmoid: True

  discriminator:
    null

  optimizer_gen:
    # see: https://github.com/Liuhong99/Sophia
    _target_: mcmlnet.training.optimization.sophia_optimizer.SophiaG
    # PreProcessor requires factor 2x-10x lower learning rate
    lr: 0.0001
    # betas: [0.965, 0.99]
    # rho: 0.1
    weight_decay: 0.001

  scheduler_gen:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    factor: 0.5
    patience: 10
    threshold: 0.01
    threshold_mode: rel
    min_lr: 1.0e-8

  optimizer_dis:
    null

  scheduler_dis:
    null

  network_init:
    null

  loss_init:
    validate:
      _target_: torch.nn.functional.l1_loss
      _recursive_: False
      reduction: mean
    train:
      _target_: torch.nn.functional.l1_loss
      _recursive_: False
      reduction: mean
    regularization_weight: null
